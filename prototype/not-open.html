<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>功能未开放</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans SC',sans-serif;background:#f5f5f5;color:#333;font-size:14px;height:100vh;display:flex;flex-direction:column}
  .status-bar{height:44px;background:#1a6b3a;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;font-weight:600;color:#fff}
  .nav-bar{height:44px;background:#1a6b3a;display:flex;align-items:center;padding:0 16px}
  .nav-back{color:#fff;font-size:18px;margin-right:12px}
  .nav-title{color:#fff;font-size:16px;font-weight:600}
  .empty-container{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .empty-icon{font-size:72px;margin-bottom:16px;opacity:0.6}
  .empty-title{font-size:18px;font-weight:700;color:#333;margin-bottom:8px}
  .empty-desc{font-size:13px;color:#aaa;text-align:center;line-height:1.8;margin-bottom:28px}
  .notify-btn{background:linear-gradient(135deg,#1a6b3a,#2d9b5a);color:#fff;padding:12px 32px;border-radius:25px;font-size:14px;font-weight:600;border:none;cursor:pointer}
  .back-btn{margin-top:12px;padding:10px 24px;border-radius:25px;font-size:13px;color:#999;border:1px solid #e0e0e0;background:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="status-bar"><span>9:41</span><span>⚡ 📶</span></div>
<div class="nav-bar">
  <div class="nav-back">‹</div>
  <div class="nav-title">预定酒店</div>
</div>
<div class="empty-container">
  <div class="empty-icon">🏗️</div>
  <div class="empty-title">功能即将上线</div>
  <div class="empty-desc">
    该功能正在加紧开发中<br>
    预计即将开放，敬请期待 🎉<br>
    开放后将第一时间通知您
  </div>
  <button class="notify-btn">📢 上线通知我</button>
  <button class="back-btn">返回首页</button>
</div>
</body>
</html>
