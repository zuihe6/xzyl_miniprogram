<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>我的订单</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans SC',sans-serif;background:#f5f5f5;color:#333;font-size:14px}
  .status-bar{height:44px;background:#1a6b3a;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;font-weight:600;color:#fff}
  .nav-bar{height:44px;background:#1a6b3a;display:flex;align-items:center;padding:0 16px;gap:12px}
  .nav-back{color:#fff;font-size:18px}
  .nav-title{color:#fff;font-size:16px;font-weight:600;flex:1;text-align:center}
  .filter-bar{background:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f0f0}
  .filter-label{font-size:13px;color:#666;flex-shrink:0}
  .filter-select{border:1px solid #e8e8e8;border-radius:6px;padding:5px 10px;font-size:12px;color:#333;background:#fff;outline:none}
  .status-tabs{background:#fff;display:flex;border-bottom:1px solid #eee}
  .status-tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;color:#666;position:relative;cursor:pointer}
  .status-tab.active{color:#1a6b3a;font-weight:600}
  .status-tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#1a6b3a;border-radius:1px}
  .scroll-content{height:calc(100vh - 44px - 44px - 43px - 44px);overflow-y:auto;padding:10px 12px}
  .order-card{background:#fff;border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,0.06)}
  .order-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f5f5f5}
  .order-no{font-size:11px;color:#aaa}
  .order-status-row{display:flex;align-items:center;gap:8px}
  .order-status{font-size:12px;font-weight:600;color:#1a6b3a}
  .del-icon{font-size:14px;color:#ccc;cursor:pointer}
  .order-body{padding:12px 14px;display:flex;gap:12px;border-bottom:1px solid #f5f5f5}
  .order-img{width:72px;height:56px;border-radius:7px;background:linear-gradient(135deg,#0d4a2e,#2d9b6b);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
  .order-img.t2{background:linear-gradient(135deg,#0d2a4a,#2d6bb5)}
  .order-meta{flex:1}
  .order-name{font-size:13px;font-weight:600;color:#222;margin-bottom:4px;line-height:1.4}
  .order-qty{font-size:11px;color:#999;margin-bottom:3px}
  .order-time{font-size:11px;color:#999}
  .order-footer{padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
  .order-amount{font-size:14px;font-weight:700;color:#ff4d4f}
  .order-actions{display:flex;gap:8px}
  .action-btn{padding:5px 14px;border-radius:20px;font-size:12px;border:1px solid #ddd;color:#666;background:#fff;cursor:pointer}
  .action-btn.primary{border-color:#1a6b3a;color:#1a6b3a;background:#f0faf4}
  .empty-state{text-align:center;padding:50px 20px}
  .empty-icon{font-size:48px;margin-bottom:12px}
  .empty-text{font-size:14px;color:#999}
</style>
</head>
<body>
<div class="status-bar"><span>9:41</span><span>⚡ 📶</span></div>
<div class="nav-bar">
  <div class="nav-back">‹</div>
  <div class="nav-title">我的订单</div>
  <div style="width:24px"></div>
</div>

<div class="filter-bar">
  <div class="filter-label">订单类型：</div>
  <select class="filter-select">
    <option>全部</option>
    <option>门票酒店</option>
    <option>体验项目</option>
    <option>套餐</option>
    <option>旅游产品</option>
  </select>
</div>

<div class="status-tabs">
  <div class="status-tab active">全部</div>
  <div class="status-tab">待付款</div>
  <div class="status-tab">待使用</div>
  <div class="status-tab">退款售后</div>
</div>

<div class="scroll-content">
  <div class="order-card">
    <div class="order-header">
      <div class="order-no">订单号：TT2024030700001</div>
      <div class="order-status-row">
        <div class="order-status">待付款</div>
        <div class="del-icon">🗑</div>
      </div>
    </div>
    <div class="order-body">
      <div class="order-img">🌊</div>
      <div class="order-meta">
        <div class="order-name">【直通车】雅鲁藏布大峡谷一日游（林芝出发）</div>
        <div class="order-qty">数量：2人</div>
        <div class="order-time">使用时间：2024-03-15</div>
      </div>
    </div>
    <div class="order-footer">
      <div class="order-amount">¥1360</div>
      <div class="order-actions">
        <div class="action-btn">删除订单</div>
        <div class="action-btn primary">去付款</div>
      </div>
    </div>
  </div>

  <div class="order-card">
    <div class="order-header">
      <div class="order-no">订单号：TT2024030500002</div>
      <div class="order-status-row">
        <div class="order-status" style="color:#f59e0b">待使用</div>
        <div class="del-icon">🗑</div>
      </div>
    </div>
    <div class="order-body">
      <div class="order-img t2">🚙</div>
      <div class="order-meta">
        <div class="order-name">丰田普拉多 5座越野 拉萨用车</div>
        <div class="order-qty">数量：1辆 · 3天</div>
        <div class="order-time">使用时间：2024-03-20</div>
      </div>
    </div>
    <div class="order-footer">
      <div class="order-amount">¥2640</div>
      <div class="order-actions">
        <div class="action-btn">删除订单</div>
        <div class="action-btn primary">查看详情</div>
      </div>
    </div>
  </div>

  <div class="order-card">
    <div class="order-header">
      <div class="order-no">订单号：TT2024022800003</div>
      <div class="order-status-row">
        <div class="order-status" style="color:#aaa">已完成</div>
        <div class="del-icon">🗑</div>
      </div>
    </div>
    <div class="order-body">
      <div class="order-img" style="background:linear-gradient(135deg,#4a1a0d,#b55a2d)">🌸</div>
      <div class="order-meta">
        <div class="order-name">【桃花节】林芝桃花盛放四日经典游</div>
        <div class="order-qty">数量：2人</div>
        <div class="order-time">使用时间：2024-03-01</div>
      </div>
    </div>
    <div class="order-footer">
      <div class="order-amount">¥4760</div>
      <div class="order-actions">
        <div class="action-btn">删除订单</div>
        <div class="action-btn primary">再次预定</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
