<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>提交订单</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Noto Sans SC',sans-serif;background:#f5f5f5;color:#333;font-size:14px}
  .status-bar{height:44px;background:#1a6b3a;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;font-weight:600;color:#fff}
  .nav-bar{height:44px;background:#1a6b3a;display:flex;align-items:center;padding:0 16px;gap:12px}
  .nav-back{color:#fff;font-size:18px}
  .nav-title{color:#fff;font-size:16px;font-weight:600;flex:1;text-align:center}
  .scroll-content{height:calc(100vh - 88px - 83px);overflow-y:auto}
  .product-card{background:#fff;margin:10px 12px;border-radius:10px;padding:12px;display:flex;gap:12px}
  .product-img{width:80px;height:60px;border-radius:8px;background:linear-gradient(135deg,#1a4a6b,#2d7ab5);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
  .product-info{flex:1}
  .product-name{font-size:14px;font-weight:600;color:#222;margin-bottom:4px}
  .qty-row{display:flex;align-items:center;justify-content:space-between}
  .qty-label{font-size:12px;color:#666}
  .qty-ctrl{display:flex;align-items:center;gap:10px}
  .qty-btn{width:24px;height:24px;border:1px solid #ddd;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:#666;background:#fff}
  .qty-num{font-size:14px;font-weight:600;color:#222;min-width:20px;text-align:center}
  .form-card{background:#fff;margin:8px 12px;border-radius:10px;overflow:hidden}
  .form-card-title{padding:12px 16px;font-size:14px;font-weight:600;color:#222;border-bottom:1px solid #f5f5f5;background:#fafafa}
  .form-item{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid #f5f5f5}
  .form-item:last-child{border-bottom:none}
  .form-label{font-size:13px;color:#333;width:72px;flex-shrink:0}
  .required{color:#ff4d4f;margin-right:2px}
  .form-input{flex:1;border:none;outline:none;font-size:13px;color:#333;background:transparent;text-align:right;color:#999}
  .form-input::placeholder{color:#ccc}
  .form-arrow{color:#ccc;margin-left:4px;font-size:12px}
  .bottom-bar{position:fixed;bottom:0;left:0;right:0;height:83px;background:#fff;border-top:1px solid #eee;padding:10px 16px 0;display:flex;align-items:center;gap:12px}
  .total-area{flex:1}
  .total-row{display:flex;align-items:baseline;gap:4px}
  .total-label{font-size:12px;color:#666}
  .total-price{font-size:20px;font-weight:800;color:#ff4d4f}
  .detail-link{font-size:12px;color:#1a6b3a;text-decoration:underline;margin-left:4px}
  .submit-btn{background:linear-gradient(135deg,#1a6b3a,#2d9b5a);color:#fff;padding:12px 28px;border-radius:25px;font-size:14px;font-weight:600;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="status-bar"><span>9:41</span><span>⚡ 📶</span></div>
<div class="nav-bar">
  <div class="nav-back">‹</div>
  <div class="nav-title">提交订单</div>
  <div style="width:24px"></div>
</div>

<div class="scroll-content">
  <div class="product-card">
    <div class="product-img">🚙</div>
    <div class="product-info">
      <div class="product-name">丰田普拉多 5座越野</div>
      <div style="font-size:12px;color:#999;margin-bottom:8px">高原专属越野，舒适宽敞</div>
      <div class="qty-row">
        <div class="qty-label">购买数量</div>
        <div class="qty-ctrl">
          <div class="qty-btn">−</div>
          <div class="qty-num">1</div>
          <div class="qty-btn">+</div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-card-title">📋 填写信息</div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>联系人</div>
      <input class="form-input" placeholder="请输入姓名" type="text">
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>手机号</div>
      <input class="form-input" placeholder="请输入手机号" type="tel">
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>用车城市</div>
      <input class="form-input" placeholder="请选择城市" type="text" readonly>
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>接驳地址</div>
      <input class="form-input" placeholder="请输入接驳地址" type="text">
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>用车时间</div>
      <input class="form-input" placeholder="请选择日期时间" type="text" readonly>
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>用车天数</div>
      <input class="form-input" placeholder="请输入天数" type="number">
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item">
      <div class="form-label"><span class="required">*</span>用车人数</div>
      <input class="form-input" placeholder="请输入人数" type="number">
      <div class="form-arrow">›</div>
    </div>
    <div class="form-item" style="align-items:flex-start;padding-top:13px">
      <div class="form-label" style="padding-top:2px">其他需求</div>
      <textarea style="flex:1;border:none;outline:none;font-size:13px;color:#333;background:transparent;resize:none;text-align:right;min-height:40px" placeholder="选填，如有特殊需求请填写"></textarea>
    </div>
  </div>

  <div style="height:10px"></div>
</div>

<div class="bottom-bar">
  <div class="total-area">
    <div style="display:flex;align-items:baseline;gap:6px">
      <span class="total-label">合计：</span>
      <span class="total-price">¥880</span>
      <span style="font-size:11px;color:#999">元</span>
      <span class="detail-link">明细</span>
    </div>
  </div>
  <button class="submit-btn">提交订单</button>
</div>
</body>
</html>
